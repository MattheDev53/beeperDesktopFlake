name: Auto Update Hash

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 0

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: hustcer/setup-nu@v3
    - uses: DeterminateSystems/determinate-nix-action@v3
    - run: nu ./update.nu
      shell: nu {0}
    - uses: stefanzweifel/git-auto-commit-action@v7
      with:
          commit_message: "[Auto] Update Hash & Version"
    - run: nix build
